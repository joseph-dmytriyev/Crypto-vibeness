services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto_vibeness_server
    ports:
      - "${SERVER_PORT:-9000}:9000"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=9000
      - LOG_DIR=/app/logs
      - KEY_DIR=/app/users
    volumes:
      # logs: read-write for server to write logs
      - ./logs:/app/logs:rw
      # users: read-only for server (cannot access private keys)
      - ./users:/app/users:ro
    networks:
      - crypto_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 9000), timeout=1)"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3
    # Security: run as non-root appuser (uid 1000)
    user: "1000:1000"

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: crypto_vibeness_client
    depends_on:
      server:
        condition: service_healthy
    environment:
      - SERVER_HOST=server
      - SERVER_PORT=9000
      - LOG_DIR=/app/logs
      - KEY_DIR=/app/users
    volumes:
      # logs: read-write for client to write logs
      - ./logs:/app/logs:rw
      # users: read-write for client (generates and manages keys)
      - ./users:/app/users:rw
    networks:
      - crypto_net
    stdin_open: true
    tty: true
    restart: unless-stopped
    # Security: run as non-root appuser (uid 1000)
    user: "1000:1000"

# Named bridge network for isolation
networks:
  crypto_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
