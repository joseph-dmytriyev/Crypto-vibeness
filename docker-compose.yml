version: '3.9'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto_vibeness_server
    ports:
      - "${SERVER_PORT:-9000}:9000"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=9000
      - LOG_DIR=/app/logs
      - KEY_DIR=/app/users
    volumes:
      - ./logs:/app/logs
      - ./users:/app/users
    networks:
      - crypto_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 9000), timeout=1)"]
      interval: 10s
      timeout: 5s
      retries: 3

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: crypto_vibeness_client
    depends_on:
      server:
        condition: service_healthy
    environment:
      - SERVER_HOST=server
      - SERVER_PORT=9000
      - LOG_DIR=/app/logs
      - KEY_DIR=/app/users
    volumes:
      - ./logs:/app/logs
      - ./users:/app/users
    networks:
      - crypto_net
    stdin_open: true
    tty: true
    restart: unless-stopped

networks:
  crypto_net:
    driver: bridge
